captainVersion: 4

services:
    $$cap_appname:
        image: langgenius/dify-web:$$cap_DIFY_VERSION
        restart: always
        environment:
            CONSOLE_API_URL: ''
            APP_API_URL: ''
            NEXT_TELEMETRY_DISABLED: '1'
            TEXT_GENERATION_TIMEOUT_MS: '60000'
            MARKETPLACE_API_URL: https://marketplace.dify.ai
            MARKETPLACE_URL: https://marketplace.dify.ai
        caproverExtra:
            containerHttpPort: '3000'
            websocketSupport: 'true'

    $$cap_appname-api:
        image: langgenius/dify-api:$$cap_DIFY_VERSION
        restart: always
        depends_on:
            - $$cap_appname-sandbox
            - $$cap_appname-plugin
        volumes:
            - $$cap_appname-storage:/app/api/storage
        environment:
            MODE: api
            SECRET_KEY: $$cap_SECRET_KEY
            DEPLOY_ENV: PRODUCTION
            MIGRATION_ENABLED: 'true'
            LOG_LEVEL: INFO
            DEBUG: 'false'
            FLASK_DEBUG: 'false'
            DIFY_BIND_ADDRESS: 0.0.0.0
            DIFY_PORT: '5001'
            SERVER_WORKER_AMOUNT: '1'
            SERVER_WORKER_CLASS: gevent
            SERVER_WORKER_CONNECTIONS: '10'
            GUNICORN_TIMEOUT: '360'
            DB_USERNAME: $$cap_DB_USERNAME
            DB_PASSWORD: $$cap_DB_PASSWORD
            DB_HOST: $$cap_DB_HOST
            DB_PORT: $$cap_DB_PORT
            DB_DATABASE: $$cap_DB_DATABASE
            REDIS_HOST: $$cap_REDIS_HOST
            REDIS_PORT: $$cap_REDIS_PORT
            REDIS_PASSWORD: $$cap_REDIS_PASSWORD
            REDIS_DB: '0'
            CELERY_BROKER_URL: redis://:$$cap_REDIS_PASSWORD@$$cap_REDIS_HOST:$$cap_REDIS_PORT/1
            CELERY_BACKEND: redis
            STORAGE_TYPE: opendal
            OPENDAL_SCHEME: fs
            OPENDAL_FS_ROOT: storage
            VECTOR_STORE: weaviate
            CODE_EXECUTION_ENDPOINT: http://srv-captain--$$cap_appname-sandbox:8194
            CODE_EXECUTION_API_KEY: $$cap_SANDBOX_API_KEY
            PLUGIN_DAEMON_URL: http://srv-captain--$$cap_appname-plugin:5002
            PLUGIN_DAEMON_KEY: $$cap_PLUGIN_DAEMON_KEY
            INNER_API_KEY_FOR_PLUGIN: $$cap_INNER_API_KEY
            PLUGIN_MAX_PACKAGE_SIZE: '52428800'
            PLUGIN_DAEMON_TIMEOUT: '600.0'
            CONSOLE_API_URL: ''
            CONSOLE_WEB_URL: ''
            SERVICE_API_URL: ''
            APP_API_URL: ''
            APP_WEB_URL: ''
            FILES_URL: ''
            WEB_API_CORS_ALLOW_ORIGINS: '*'
            CONSOLE_CORS_ALLOW_ORIGINS: '*'
            SSRF_PROXY_HTTP_URL: ''
            SSRF_PROXY_HTTPS_URL: ''
            MARKETPLACE_ENABLED: 'true'
            MARKETPLACE_API_URL: https://marketplace.dify.ai
            FORCE_VERIFYING_SIGNATURE: 'true'
            ENDPOINT_URL_TEMPLATE: ''
            RESPECT_XFORWARD_HEADERS_ENABLED: 'true'
            ETL_TYPE: dify
            MULTIMODAL_SEND_FORMAT: base64
            INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH: '4000'
            INVITE_EXPIRY_HOURS: '72'
            UPLOAD_FILE_SIZE_LIMIT: '15'
            UPLOAD_FILE_BATCH_LIMIT: '5'
        caproverExtra:
            notExposeAsWebApp: 'true'

    $$cap_appname-worker:
        image: langgenius/dify-api:$$cap_DIFY_VERSION
        restart: always
        depends_on:
            - $$cap_appname-api
        volumes:
            - $$cap_appname-storage:/app/api/storage
        environment:
            MODE: worker
            SECRET_KEY: $$cap_SECRET_KEY
            DEPLOY_ENV: PRODUCTION
            LOG_LEVEL: INFO
            DB_USERNAME: $$cap_DB_USERNAME
            DB_PASSWORD: $$cap_DB_PASSWORD
            DB_HOST: $$cap_DB_HOST
            DB_PORT: $$cap_DB_PORT
            DB_DATABASE: $$cap_DB_DATABASE
            REDIS_HOST: $$cap_REDIS_HOST
            REDIS_PORT: $$cap_REDIS_PORT
            REDIS_PASSWORD: $$cap_REDIS_PASSWORD
            REDIS_DB: '0'
            CELERY_BROKER_URL: redis://:$$cap_REDIS_PASSWORD@$$cap_REDIS_HOST:$$cap_REDIS_PORT/1
            CELERY_BACKEND: redis
            STORAGE_TYPE: opendal
            OPENDAL_SCHEME: fs
            OPENDAL_FS_ROOT: storage
            VECTOR_STORE: weaviate
            CODE_EXECUTION_ENDPOINT: http://srv-captain--$$cap_appname-sandbox:8194
            CODE_EXECUTION_API_KEY: $$cap_SANDBOX_API_KEY
            PLUGIN_DAEMON_URL: http://srv-captain--$$cap_appname-plugin:5002
            PLUGIN_DAEMON_KEY: $$cap_PLUGIN_DAEMON_KEY
            INNER_API_KEY_FOR_PLUGIN: $$cap_INNER_API_KEY
            PLUGIN_MAX_PACKAGE_SIZE: '52428800'
            SSRF_PROXY_HTTP_URL: ''
            SSRF_PROXY_HTTPS_URL: ''
            MARKETPLACE_ENABLED: 'true'
            MARKETPLACE_API_URL: https://marketplace.dify.ai
            FORCE_VERIFYING_SIGNATURE: 'true'
            ETL_TYPE: dify
            MULTIMODAL_SEND_FORMAT: base64
            INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH: '4000'
        caproverExtra:
            notExposeAsWebApp: 'true'

    $$cap_appname-beat:
        image: langgenius/dify-api:$$cap_DIFY_VERSION
        restart: always
        depends_on:
            - $$cap_appname-api
        environment:
            MODE: beat
            SECRET_KEY: $$cap_SECRET_KEY
            DEPLOY_ENV: PRODUCTION
            LOG_LEVEL: INFO
            DB_USERNAME: $$cap_DB_USERNAME
            DB_PASSWORD: $$cap_DB_PASSWORD
            DB_HOST: $$cap_DB_HOST
            DB_PORT: $$cap_DB_PORT
            DB_DATABASE: $$cap_DB_DATABASE
            REDIS_HOST: $$cap_REDIS_HOST
            REDIS_PORT: $$cap_REDIS_PORT
            REDIS_PASSWORD: $$cap_REDIS_PASSWORD
            REDIS_DB: '0'
            CELERY_BROKER_URL: redis://:$$cap_REDIS_PASSWORD@$$cap_REDIS_HOST:$$cap_REDIS_PORT/1
            CELERY_BACKEND: redis
        caproverExtra:
            notExposeAsWebApp: 'true'

    $$cap_appname-sandbox:
        image: langgenius/dify-sandbox:$$cap_SANDBOX_VERSION
        restart: always
        volumes:
            - $$cap_appname-sandbox-deps:/dependencies
        environment:
            API_KEY: $$cap_SANDBOX_API_KEY
            GIN_MODE: release
            WORKER_TIMEOUT: '15'
            ENABLE_NETWORK: 'true'
            SANDBOX_PORT: '8194'
        caproverExtra:
            notExposeAsWebApp: 'true'

    $$cap_appname-plugin:
        image: langgenius/dify-plugin-daemon:$$cap_PLUGIN_VERSION
        restart: always
        volumes:
            - $$cap_appname-plugin-data:/app/storage
        environment:
            DB_USERNAME: $$cap_DB_USERNAME
            DB_PASSWORD: $$cap_DB_PASSWORD
            DB_HOST: $$cap_DB_HOST
            DB_PORT: $$cap_DB_PORT
            DB_DATABASE: $$cap_DB_PLUGIN_DATABASE
            REDIS_HOST: $$cap_REDIS_HOST
            REDIS_PORT: $$cap_REDIS_PORT
            REDIS_PASSWORD: $$cap_REDIS_PASSWORD
            SERVER_PORT: '5002'
            SERVER_KEY: $$cap_PLUGIN_DAEMON_KEY
            MAX_PLUGIN_PACKAGE_SIZE: '52428800'
            DIFY_INNER_API_URL: http://srv-captain--$$cap_appname-api:5001
            DIFY_INNER_API_KEY: $$cap_INNER_API_KEY
            PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
            PLUGIN_REMOTE_INSTALLING_PORT: '5003'
            PLUGIN_WORKING_PATH: /app/storage/cwd
            PLUGIN_STORAGE_TYPE: local
            PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
            PLUGIN_INSTALLED_PATH: plugin
            PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
            PLUGIN_MEDIA_CACHE_PATH: assets
            FORCE_VERIFYING_SIGNATURE: 'true'
            PYTHON_ENV_INIT_TIMEOUT: '120'
            PLUGIN_MAX_EXECUTION_TIMEOUT: '600'
        caproverExtra:
            notExposeAsWebApp: 'true'

caproverOneClickApp:
    displayName: Dify
    isOfficial: false
    description: Open-source LLM app development platform with AI workflows, RAG pipelines, and agent capabilities.
    documentation: https://docs.dify.ai
    instructions:
        start: |-
            Prerequisites:
            1. An existing PostgreSQL instance with two databases created: 'dify' and 'dify_plugin'
            2. An existing Redis instance

            After deploying, you need to configure custom nginx routing in the main app's HTTP Settings to forward API requests to the backend. Add these location blocks to Custom Nginx Configurations:

            location /console/api { proxy_pass http://srv-captain--$$cap_appname-api:5001; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 3600s; proxy_send_timeout 3600s; client_max_body_size 100M; }
            location /api { proxy_pass http://srv-captain--$$cap_appname-api:5001; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 3600s; proxy_send_timeout 3600s; client_max_body_size 100M; }
            location /v1 { proxy_pass http://srv-captain--$$cap_appname-api:5001; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 3600s; proxy_send_timeout 3600s; }
            location /files { proxy_pass http://srv-captain--$$cap_appname-api:5001; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /e/ { proxy_pass http://srv-captain--$$cap_appname-plugin:5002; proxy_set_header Dify-Hook-Url $scheme://$host$request_uri; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /mcp { proxy_pass http://srv-captain--$$cap_appname-api:5001; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /triggers { proxy_pass http://srv-captain--$$cap_appname-api:5001; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        end: |-
            Dify is deployed!

            Next steps:
            1. Add the custom nginx routing config shown in the start instructions to the main app's HTTP Settings > Custom Nginx Configurations
            2. Go to the dify-api app's environment variables and set:
               - CONSOLE_API_URL = https://$$cap_appname.$$cap_root_domain
               - CONSOLE_WEB_URL = https://$$cap_appname.$$cap_root_domain
               - APP_API_URL = https://$$cap_appname.$$cap_root_domain
               - APP_WEB_URL = https://$$cap_appname.$$cap_root_domain
               - FILES_URL = https://$$cap_appname.$$cap_root_domain
               - ENDPOINT_URL_TEMPLATE = https://$$cap_appname.$$cap_root_domain/e/{hook_id}
            3. Go to the main web app's environment variables and set:
               - CONSOLE_API_URL = https://$$cap_appname.$$cap_root_domain
               - APP_API_URL = https://$$cap_appname.$$cap_root_domain
            4. Enable HTTPS on the main app
            5. Open your app URL to set up the admin account
    variables:
        - id: $$cap_DIFY_VERSION
          label: Dify Version
          defaultValue: '1.13.3'
          description: Check https://github.com/langgenius/dify/releases for latest version
          validRegex: /^([^\s^\/])+$/
        - id: $$cap_PLUGIN_VERSION
          label: Plugin Daemon Version
          defaultValue: '0.5.3-local'
          validRegex: /^([^\s^\/])+$/
        - id: $$cap_SANDBOX_VERSION
          label: Sandbox Version
          defaultValue: '0.2.14'
          validRegex: /^([^\s^\/])+$/
        - id: $$cap_SECRET_KEY
          label: Secret Key
          defaultValue: $$cap_gen_random_hex(64)
          description: Random secret key for the application. Auto-generated.
        - id: $$cap_DB_HOST
          label: PostgreSQL Host
          defaultValue: srv-captain--your-postgres-app
          description: 'CapRover service name of your PostgreSQL, e.g., srv-captain--postgres'
          validRegex: /^([^\s])+$/
        - id: $$cap_DB_PORT
          label: PostgreSQL Port
          defaultValue: '5432'
        - id: $$cap_DB_USERNAME
          label: PostgreSQL Username
          defaultValue: postgres
          validRegex: /^([^\s])+$/
        - id: $$cap_DB_PASSWORD
          label: PostgreSQL Password
          description: Password for your PostgreSQL instance
          validRegex: /^([^\s])+$/
        - id: $$cap_DB_DATABASE
          label: PostgreSQL Database (main)
          defaultValue: dify
          description: Must be created before deploying
        - id: $$cap_DB_PLUGIN_DATABASE
          label: PostgreSQL Database (plugin)
          defaultValue: dify_plugin
          description: Must be created before deploying
        - id: $$cap_REDIS_HOST
          label: Redis Host
          defaultValue: srv-captain--your-redis-app
          description: 'CapRover service name of your Redis, e.g., srv-captain--redis'
          validRegex: /^([^\s])+$/
        - id: $$cap_REDIS_PORT
          label: Redis Port
          defaultValue: '6379'
        - id: $$cap_REDIS_PASSWORD
          label: Redis Password
          description: Password for your Redis instance (leave empty if no password)
        - id: $$cap_INNER_API_KEY
          label: Plugin Inner API Key
          defaultValue: $$cap_gen_random_hex(64)
          description: Internal communication key between API and Plugin Daemon. Auto-generated.
        - id: $$cap_SANDBOX_API_KEY
          label: Sandbox API Key
          defaultValue: $$cap_gen_random_hex(32)
          description: API key for sandbox service. Auto-generated.
        - id: $$cap_PLUGIN_DAEMON_KEY
          label: Plugin Daemon Key
          defaultValue: $$cap_gen_random_hex(64)
          description: Key for plugin daemon authentication. Auto-generated.
